<!DOCTYPE html>
<html>
<head>
    <title>Diary</title>

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #f0f0f0;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            color: black;
            text-decoration: none;
        }

        .main {
            margin-left: 210px;
            text-align: center;
            padding: 20px;
        }

        textarea {
            width: 60%;
            height: 300px;
            font-family: 'Patrick Hand', cursive;
            font-size: 22px;
            line-height: 1.6;
            border: 1px solid gray;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="calendar.html">Calendar</a>
    <a href="search.html">Search</a>
    <a href="login.html">Logout</a>
</div>

<div class="main">
    <h2 id="dateTitle"></h2>

    <textarea id="note" placeholder="Write your memory..."></textarea><br>

    <button onclick="saveNote()">Save</button>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let date = params.get("date");
let month = params.get("month");
let year = params.get("year");

const monthNames = ["January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"];

document.getElementById("dateTitle").innerText =
    date + " " + monthNames[month] + " " + year;

fetch("http://127.0.0.1:5000/get_note", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
        date: date,
        month: month,
        year: year
    })
})
.then(res => res.json())
.then(data => {
    if(data.note) {
        document.getElementById("note").value = data.note;
    }
});

function saveNote() {
    let note = document.getElementById("note").value;

    fetch("http://127.0.0.1:5000/save_note", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            date: date,
            month: month,
            year: year,
            note: note
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Saved successfully");
    });
}
</script>

</body>
</html>
